name: Daily FinNews Report

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-finnews-report
  cancel-in-progress: false

jobs:
  generate-and-email:
    runs-on: ubuntu-latest
    env:
      REPORT_TIMEZONE: Asia/Taipei
      EMAIL_ENABLED: 'true'
      SHOW_RANK_DEBUG: 'false'
      SUMMARIZER_PROVIDER: ${{ secrets.SUMMARIZER_PROVIDER != '' && secrets.SUMMARIZER_PROVIDER || 'none' }}
      GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
      NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Generate report and send email
        run: python main.py

      - name: Commit refreshed docs
        run: |
          if git diff --quiet -- docs/index.html; then
            echo "No docs changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "Update daily FinNews report"
          git push